name: Auto Renew Server (Xray-Node-Rotation-Retry)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'
  repository_dispatch:
    types: [service-down-alert]

jobs:
  run-renew:
    runs-on: ubuntu-latest

    steps:
      # ==============================
      # 拉取代码
      # ==============================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==============================
      # Python环境与智能缓存
      # ==============================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ==============================
      # 1. 安装基础系统依赖
      # ==============================
      - name: Install Base System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl wget net-tools

      # ==============================
      # 2. Chrome 浏览器智能缓存
      # ==============================
      - name: Cache Chrome Browser
        id: cache-chrome
        uses: actions/cache@v3
        with:
          path: /opt/google/chrome
          key: chrome-stable-v1

      - name: Install Google Chrome
        if: steps.cache-chrome.outputs.cache-hit != 'true'
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # ==============================
      # 3. Python依赖安装
      # ==============================
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            #pip install requests>=2.28.0 DrissionPage>=4.0.0 pydub>=0.25.1 SpeechRecognition>=3.10.0 xvfbwrapper>=0.2.9
            pip install requests>=2.28.0 DrissionPage>=4.0.0 DataRecorder pydub>=0.25.1 SpeechRecognition>=3.10.0 xvfbwrapper>=0.2.9
          fi

      # ==============================
      # 4. 准备 Xray 环境
      # ==============================
      - name: Cache Xray
        id: cache-xray
        uses: actions/cache@v3
        with:
          path: |
            ./xray
            ./geoip.dat
            ./geosite.dat
          key: ${{ runner.os }}-xray-25.4.30

      - name: 🛡️ Download and Verify Xray
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then
            echo "⚠️ 未设置 PROXY_URL，将尝试直连或后续脚本自行处理。"
            exit 0
          fi

          if [ "${{ steps.cache-xray.outputs.cache-hit }}" != "true" ]; then
            XRAY_VER="25.4.30"
            echo "📥 正在下载 Xray-core v${XRAY_VER}..."

            wget -q "https://github.com/XTLS/Xray-core/releases/download/v${XRAY_VER}/Xray-linux-64.zip" -O xray.zip

            unzip -o xray.zip
            chmod +x ./xray

            rm -f xray.zip
          else
            echo "⚡ 命中 Xray 缓存，跳过下载！"
            chmod +x ./xray || true
          fi

          echo "🔎 Xray 版本信息："
          ./xray version || true

          echo "⚙️ 验证 PROXY_URL 解析..."
          python proxy_handler.py

      # ==============================
      # 5. 运行核心续期脚本
      # ==============================
      - name: 🚀 Run Renew Script with Xray IP Rotation
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HIDE_IP: ${{ vars.HIDE_IP }}
        run: |
          echo "🔥 启动智能续期主控脚本..."
          python main.py

      # ==============================
      # 6. 调试截图上传
      # ==============================
      #- name: Upload Debug Screenshots
        #uses: actions/upload-artifact@v4
        #if: always()
        #with:
          #name: debug-screenshots
          #path: ./*.png
          #retention-days: 3

      # ==============================
      # 7. 显示执行摘要
      # ==============================
      - name: Summary
        if: always()
        run: |
          echo "======================================"
          echo "🎯 Workflow 执行完成"
          echo "======================================"
          echo "✅ Python 依赖: 已安装/缓存读取"
          echo "✅ Xray: 已准备就绪"
          echo "✅ 代理节点: 已按索引生成 Xray config.json"
          echo "✅ 主脚本: 已运行"
          echo "======================================"
